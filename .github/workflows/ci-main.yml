name: ci-main

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'

# Verhindert Race-Condition beim Bump-Push:
# Mehrere parallele Runs (z.B. nach mehreren schnell aufeinanderfolgenden
# Merges) wuerden sonst alle versuchen, einen eigenen Bump-Commit + Tag
# auf master zu pushen. Der erste gewinnt, alle weiteren scheitern mit
# "rejected (fetch first)" und es entstehen verwaiste Tags.
#
# group=ci-main-master: alle Push-Runs auf master teilen sich den Slot.
# cancel-in-progress=false: laufende Runs werden NICHT abgebrochen
#   (sonst koennte ein bereits halb gepushtes Docker-Image verwaisen);
#   neue Runs warten brav, bis der vorige fertig ist.
concurrency:
  group: ci-main-master
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    name: CI Prod
    outputs:
      version: ${{ steps.reserve.outputs.new_version }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # CI_PAT pusht spaeter Commit + Tag auf den geschuetzten master.
          token: ${{ secrets.CI_PAT }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache wird nicht benötigt, da der Build komplett im Docker-Container läuft
          # Dependencies werden im Container installiert, nicht auf dem Runner

      # Version ZUERST auf master sperren (vor dem minutenlangen Docker-Build).
      # So ist das Race-Fenster nur wenige Sekunden gross und der Docker-Tag
      # kann garantiert mit der final gesperrten Git-Version uebereinstimmen.
      # Bei Push-Ablehnung wird KEIN Rebase versucht (das fuehrte frueher zu
      # VERSION-Konflikten), sondern hart auf den aktuellen master zurueck-
      # gesetzt und neu gebumpt -> konfliktfrei.
      - name: Reserve version on master
        id: reserve
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git remote set-url origin https://x-access-token:${{ secrets.CI_PAT }}@github.com/${{ github.repository }}.git

          # Patch-Bump in Bash: letzte Komponente +1 (kein externes Action noetig).
          bump_patch() {
            local major minor patch
            IFS='.' read -r major minor patch <<< "$1"
            echo "${major}.${minor}.$((patch + 1))"
          }

          # Basis = groesste bekannte Version aus VERSION-Datei und neuestem v*-Tag.
          compute_new() {
            local file_version latest_tag tag_version base
            file_version=$(tr -d '[:space:]' < VERSION)
            latest_tag=$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)
            tag_version="${latest_tag#v}"
            if [ -n "$tag_version" ]; then
              base=$(printf '%s\n%s\n' "$file_version" "$tag_version" | sort -V | tail -n 1)
            else
              base="$file_version"
            fi
            bump_patch "$base"
          }

          new_version=""
          pushed=false
          for attempt in 1 2 3 4 5; do
            new_version=$(compute_new)
            echo "Versuch ${attempt}: bumpe auf ${new_version}."
            echo "${new_version}" > VERSION
            git add VERSION
            git commit -m "Bump version to ${new_version} [skip ci]"
            if git push origin HEAD:master; then
              pushed=true
              echo "Version ${new_version} auf master gesperrt (Versuch ${attempt})."
              break
            fi
            echo "Push abgelehnt - master hat sich bewegt. Reset + Neu-Bump (Versuch ${attempt}/5)."
            git fetch --tags --force origin master
            git reset --hard origin/master
            sleep "$((attempt * 5))"
          done

          if [ "${pushed}" != "true" ]; then
            echo "Version-Reservierung nach 5 Versuchen fehlgeschlagen."
            exit 1
          fi

          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/bcommonslab/commonkno:latest,ghcr.io/bcommonslab/commonkno:${{ steps.reserve.outputs.new_version }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MONGODB_DATABASE_NAME=${{ secrets.MONGODB_DATABASE_NAME }}
            MONGODB_COLLECTION_NAME=${{ secrets.MONGODB_COLLECTION_NAME }}
            
      # Tag erst NACH erfolgreichem Docker-Build setzen, damit ein fehl-
      # geschlagener Build keinen verwaisten Tag/Release hinterlaesst. Der
      # Bump-Commit liegt bereits auf master (siehe "Reserve version"), der
      # lokale HEAD zeigt darauf - der Tag landet also garantiert auf dem
      # richtigen Commit. Kein Rebase noetig, da die Version bereits gesperrt ist.
      - name: Tag and push
        run: |
          set -euo pipefail
          git tag -a -m "${{ steps.reserve.outputs.new_version }}" "v${{ steps.reserve.outputs.new_version }}"
          git push origin "v${{ steps.reserve.outputs.new_version }}"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          generate_release_notes: true
          tag_name: v${{ steps.reserve.outputs.new_version }}
      # This currently does not work, because dokploy will not pull the latest image, manually change the tag in dokploy. 
      - name: Trigger deployment
        run: curl -X GET https://dokploy.bcommonslab.org/api/deploy/compose/evw5skg-YMLsoiJx17t-m


