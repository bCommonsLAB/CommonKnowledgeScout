name: ci-main

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'

# Verhindert Race-Condition beim Bump-Push:
# Mehrere parallele Runs (z.B. nach mehreren schnell aufeinanderfolgenden
# Merges) wuerden sonst alle versuchen, einen eigenen Bump-Commit + Tag
# auf master zu pushen. Der erste gewinnt, alle weiteren scheitern mit
# "rejected (fetch first)" und es entstehen verwaiste Tags.
#
# group=ci-main-master: alle Push-Runs auf master teilen sich den Slot.
# cancel-in-progress=false: laufende Runs werden NICHT abgebrochen
#   (sonst koennte ein bereits halb gepushtes Docker-Image verwaisen);
#   neue Runs warten brav, bis der vorige fertig ist.
concurrency:
  group: ci-main-master
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    name: CI Prod
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # CI_PAT pusht spaeter Commit + Tag auf den geschuetzten master.
          token: ${{ secrets.CI_PAT }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache wird nicht benötigt, da der Build komplett im Docker-Container läuft
          # Dependencies werden im Container installiert, nicht auf dem Runner

      - name: read version sources
        id: read_version
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)
          TAG_VERSION="${LATEST_TAG#v}"

          if [ -n "$TAG_VERSION" ]; then
            BASE_VERSION=$(printf '%s\n%s\n' "$FILE_VERSION" "$TAG_VERSION" | sort -V | tail -n 1)
          else
            BASE_VERSION="$FILE_VERSION"
          fi

          echo "FILE_VERSION=$FILE_VERSION" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT

          echo "Version aus Datei: $FILE_VERSION"
          echo "Neuester Tag: ${TAG_VERSION:-<kein Tag>}"
          echo "Basis für Bump: $BASE_VERSION"

      - name: bump version
        id: bump
        uses: cbrgm/semver-bump-action@main
        with:
          current-version: ${{ steps.read_version.outputs.BASE_VERSION }}
          bump-level: patch

      - name: write version file
        run: echo "${{ steps.bump.outputs.new_version }}" > VERSION

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/bcommonslab/commonkno:latest,ghcr.io/bcommonslab/commonkno:${{ steps.bump.outputs.new_version }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MONGODB_DATABASE_NAME=${{ secrets.MONGODB_DATABASE_NAME }}
            MONGODB_COLLECTION_NAME=${{ secrets.MONGODB_COLLECTION_NAME }}
            
      - name: Push version commit and tag
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git remote set-url origin https://x-access-token:${{ secrets.CI_PAT }}@github.com/${{ github.repository }}.git
          git add VERSION
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag -a -m "${{ steps.bump.outputs.new_version }}" v${{ steps.bump.outputs.new_version }}
          git push --follow-tags
          
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          generate_release_notes: true
          tag_name: v${{ steps.bump.outputs.new_version }}
      # This currently does not work, because dokploy will not pull the latest image, manually change the tag in dokploy. 
      - name: Trigger deployment
        run: curl -X GET https://dokploy.bcommonslab.org/api/deploy/compose/evw5skg-YMLsoiJx17t-m


